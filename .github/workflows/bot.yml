name: Roma Match Bot

on:
  schedule:
    - cron: "*/15 * * * *"
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Modalità di esecuzione"
        required: false
        default: "auto"
        type: choice
        options:
          - "auto"
          - "force"
          - "halftime"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Esegui bot (schedule — auto)
        if: github.event_name == 'schedule'
        env:
          BSKY_HANDLE:       ${{ secrets.BSKY_HANDLE }}
          BSKY_PASSWORD:     ${{ secrets.BSKY_PASSWORD }}
          IG_USER_ID:        ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN:   ${{ secrets.IG_ACCESS_TOKEN }}
          VERCEL_DOMAIN:     ${{ secrets.VERCEL_DOMAIN }}
          GITHUB_TOKEN:      ${{ secrets.GH_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python bot.py
          python bot.py --halftime

      - name: Esegui bot (manuale)
        if: github.event_name == 'workflow_dispatch'
        env:
          BSKY_HANDLE:       ${{ secrets.BSKY_HANDLE }}
          BSKY_PASSWORD:     ${{ secrets.BSKY_PASSWORD }}
          IG_USER_ID:        ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN:   ${{ secrets.IG_ACCESS_TOKEN }}
          VERCEL_DOMAIN:     ${{ secrets.VERCEL_DOMAIN }}
          GITHUB_TOKEN:      ${{ secrets.GH_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ "$MODE" = "force" ]; then
            python bot.py --force
          elif [ "$MODE" = "halftime" ]; then
            python bot.py --halftime
          else
            python bot.py
          fi

      - name: Commit dati dashboard + immagine
        run: |
          git config user.name  "Roma Bot"
          git config user.email "bot@roma-stats.com"
          git add dashboard_data.json last_posted.json match_card.png 2>/dev/null || true
          git diff --staged --quiet || git commit -m "📊 Update match data [skip ci]"
          git push || true
