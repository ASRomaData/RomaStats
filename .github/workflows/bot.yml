name: Roma Match Bot

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Forza invio'
        type: boolean
        default: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installa dipendenze
        run: pip install curl_cffi atproto

      - name: Esegui bot
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}
          FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}
        run: python bot.py

      - name: Salva modifiche
        run: |
          git config user.name "Roma Bot"
          git config user.email "bot@roma.com"
          git add dashboard_data.json last_posted.json || true
          git commit -m "Update dashboard [skip ci]" || true
          git push || true
